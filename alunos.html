<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Academia VeritasWay • Alunos</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#141210;
color:#F9F3E8;
font-family:Arial;
margin:0;
padding:0;
}

header{
background:#1c1916;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #333;
}

h1{
color:#C9A84C;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
padding:30px;
}

.card{
background:#1c1916;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
background:#2a2723;
border:none;
color:white;
border-radius:5px;
}

button{
background:#C9A84C;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:0.9;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #333;
text-align:left;
}

th{
color:#C9A84C;
}

.action-btn{
background:#333;
color:white;
margin-right:5px;
}

.delete{
background:#8b2d2d;
}

</style>

</head>
<body>

<header>

<h1>Academia VeritasWay</h1>

<button onclick="abrirNovo()">Novo Aluno</button>

</header>

<div class="container">

<div class="card">

<h2>Buscar</h2>

<input id="busca" placeholder="Buscar aluno..." oninput="render()">

<select id="filtroTurma" onchange="render()">
<option value="">Todas as turmas</option>
</select>

</div>

<div class="card">

<h2>Alunos</h2>

<table>

<thead>

<tr>
<th>Nome</th>
<th>Email</th>
<th>Turma</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="lista"></tbody>

</table>

</div>

</div>

<div id="modal" style="display:none">

<div style="position:fixed;inset:0;background:black;opacity:.6"></div>

<div style="
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#1c1916;
padding:30px;
border-radius:10px;
width:350px;
">

<h2 id="tituloModal">Novo aluno</h2>

<input id="nome" placeholder="Nome">

<input id="email" placeholder="Email">

<select id="turma"></select>

<button onclick="salvar()">Salvar</button>
<button onclick="fecharModal()">Cancelar</button>

</div>

</div>

<script>

const SUPABASE_URL = "COLE_AQUI_URL";
const SUPABASE_KEY = "COLE_AQUI_KEY";

const client = supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let alunos=[]
let turmas=[]
let editando=null

async function carregarTurmas(){

let {data}=await client
.from("turmas")
.select("*")

turmas=data||[]

const select=document.getElementById("turma")
const filtro=document.getElementById("filtroTurma")

select.innerHTML=""
filtro.innerHTML='<option value="">Todas as turmas</option>'

turmas.forEach(t=>{

select.innerHTML+=`<option value="${t.id}">${t.nome}</option>`

filtro.innerHTML+=`<option value="${t.id}">${t.nome}</option>`

})

}

async function carregarAlunos(){

let {data}=await client
.from("alunos")
.select("*")
.order("created_at",{ascending:false})

alunos=data||[]

render()

}

function turmaNome(id){

let t=turmas.find(x=>x.id==id)

return t?t.nome:"-"

}

function render(){

let busca=document.getElementById("busca").value.toLowerCase()

let turma=document.getElementById("filtroTurma").value

let lista=alunos.filter(a=>{

let okBusca=!busca||a.nome.toLowerCase().includes(busca)

let okTurma=!turma||a.turma_id==turma

return okBusca&&okTurma

})

const tbody=document.getElementById("lista")

tbody.innerHTML=""

lista.forEach(a=>{

tbody.innerHTML+=`

<tr>

<td>${a.nome}</td>

<td>${a.email}</td>

<td>${turmaNome(a.turma_id)}</td>

<td>

<button class="action-btn" onclick="editar('${a.id}')">Editar</button>

<button class="action-btn delete" onclick="excluir('${a.id}')">Excluir</button>

</td>

</tr>

`

})

}

function abrirNovo(){

editando=null

document.getElementById("tituloModal").innerText="Novo aluno"

document.getElementById("nome").value=""
document.getElementById("email").value=""
document.getElementById("modal").style.display="block"

}

function editar(id){

let a=alunos.find(x=>x.id==id)

editando=id

document.getElementById("tituloModal").innerText="Editar aluno"

document.getElementById("nome").value=a.nome
document.getElementById("email").value=a.email
document.getElementById("turma").value=a.turma_id

document.getElementById("modal").style.display="block"

}

function fecharModal(){

document.getElementById("modal").style.display="none"

}

async function salvar(){

let nome=document.getElementById("nome").value
let email=document.getElementById("email").value
let turma=document.getElementById("turma").value

if(!nome||!email){

alert("Preencha nome e email")

return

}

if(editando){

await client
.from("alunos")
.update({nome,email,turma_id:turma})
.eq("id",editando)

}else{

await client
.from("alunos")
.insert({nome,email,turma_id:turma})

}

fecharModal()

await carregarAlunos()

}

async function excluir(id){

if(!confirm("Excluir aluno?"))return

await client
.from("alunos")
.delete()
.eq("id",id)

await carregarAlunos()

}

async function init(){

await carregarTurmas()

await carregarAlunos()

}

init()

</script>

</body>
</html>
